<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeedWorld - Game</title>
    <link rel="stylesheet" href="./src/ui/tileGrid.css" />
    <style>
      :root {
        --bg-base: #0a1210;
        --bg-mid: #13221d;
        --bg-highlight: #224437;
        --ink: #ebf9f1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Space Grotesk", "IBM Plex Sans", "Trebuchet MS", sans-serif;
        background:
          radial-gradient(1150px 650px at 12% -8%, rgb(67 127 100 / 38%), transparent 62%),
          radial-gradient(980px 520px at 88% 108%, rgb(33 82 69 / 48%), transparent 58%),
          linear-gradient(165deg, var(--bg-mid), var(--bg-base) 65%);
      }

      .game-shell {
        min-height: 100vh;
        padding: 18px 18px 192px;
        display: grid;
        place-items: center;
        position: relative;
        animation: rise-in 420ms ease-out;
      }

      #tile-grid-container {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 3;
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 720px) {
        .game-shell {
          padding: 12px 10px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .game-shell {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="game-shell" aria-label="SeedWorld Spielansicht">
      <div id="tile-grid-container"></div>
    </main>

    <script type="module" src="./src/main.js?rev=20260331a"></script>
  </body>
</html>
