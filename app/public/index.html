<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeedWorld</title>
    <style>
      :root {
        --bg: #030704;
        --panel: #06140b;
        --ink: #d3ffe2;
        --accent: #2cff88;
        --accent-2: #0ea75b;
        --border: #174428;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #0a1a10, var(--bg) 58%);
        color: var(--ink);
        font-family: "Space Grotesk", "IBM Plex Sans", "Trebuchet MS", sans-serif;
      }

      .shell {
        width: min(980px, 96vw);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 1.4rem;
        background: linear-gradient(180deg, rgb(10 45 24 / 72%), rgb(6 20 11 / 92%));
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 6%),
          0 18px 48px rgb(0 0 0 / 38%);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(1.4rem, 3.8vw, 2rem);
        letter-spacing: 0.04em;
      }

      .launch {
        display: inline-block;
        background: linear-gradient(180deg, #0a2d18, #06140b);
        color: var(--ink);
        text-decoration: none;
        padding: 1rem 1.2rem;
        border-radius: 14px;
        font-size: clamp(1rem, 2.8vw, 1.25rem);
        font-weight: 700;
        border: 1px solid var(--border);
      }

      .launch strong {
        display: block;
        font-size: 1.15em;
        margin-bottom: 0.35rem;
        color: var(--accent);
      }

      .launch:hover { border-color: var(--accent-2); }

      .hint {
        margin: 1rem 0 0;
        font-size: 0.92rem;
        opacity: 0.88;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>SeedWorld</h1>
      <a class="launch" href="./game.html">
        <strong>🎮 DIRECT GAME</strong>
        Direkt in die einzige verbleibende Browser-Ansicht.
      </a>
      <p class="hint">Kein Browser-Menue, keine Patch-Oberflaeche, kein zweiter Navigationspfad.</p>
    </main>
  </body>
</html>
